name: Medispan Pipeline

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "Google Drive ZIP link"
        required: true
      excel_url:
        description: "Google Drive XLS link"
        required: true

jobs:
  run:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: medispan_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install gdown

      - name: Wait for MySQL
        run: sleep 20

      - name: Download input files
        run: |
          rm -rf assets
          mkdir assets
          gdown "${{ github.event.inputs.zip_url }}" -O assets/input.zip
          gdown "${{ github.event.inputs.excel_url }}" -O assets/changes.xls

      - name: Run pipeline
        run: python main.py

      - name: Upload SQL output
        uses: actions/upload-artifact@v4
        with:
          name: medispan-output
          path: medispan_dump.sql

      - name: Show download instructions
          run: |
            echo "===================================="
            echo "SQL READY FOR DOWNLOAD"
            echo "Go to: Actions → This run → Artifacts"
            echo "Download: medispan-output"
            echo "===================================="