name: Medispan Pipeline

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Year folder (default: current year)"
        required: false
      month:
        description: "Month folder 1-12 (default: current month)"
        required: false

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: medispan_test
      # Exercises production deploy path (mocked → mock-rxmax) on CI MySQL.
      DEPLOY_TARGET: production
      DEPLOY_ALLOW_PRODUCTION: "false"
      DEPLOY_MOCK_DATABASE: mock-rxmax
      DEPLOY_SKIP_ON_CI: "false"

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: medispan_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install MySQL client
        run: sudo apt-get update && sudo apt-get install -y default-mysql-client

      - name: Wait for MySQL
        run: sleep 20

      - name: Run pipeline
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_ZIP_ROOT_FOLDER_ID: ${{ secrets.GDRIVE_ZIP_ROOT_FOLDER_ID }}
          GDRIVE_XLS_ROOT_FOLDER_ID: ${{ secrets.GDRIVE_XLS_ROOT_FOLDER_ID }}
          GDRIVE_SQL_ROOT_FOLDER_ID: ${{ secrets.GDRIVE_SQL_ROOT_FOLDER_ID }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          PIPELINE_YEAR: ${{ github.event.inputs.year }}
          PIPELINE_MONTH: ${{ github.event.inputs.month }}
        run: python main.py

      - name: Verify database deploy (CI smoke test)
        run: python verify_ci_deploy.py

      - name: Upload SQL output
        uses: actions/upload-artifact@v4
        with:
          name: medispan-output
          path: medispan_dump.sql

      - name: Sync local mock schema (run on your PC)
        if: success()
        run: |
          echo "Remote pipeline finished. SQL is on Google Drive."
          echo "On your machine (with local MySQL + Workbench), run:"
          echo "  python sync_mock_from_drive.py"
